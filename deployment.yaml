apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-devops-agent

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-devops-agent

  template:
    metadata:
      labels:
        app: ai-devops-agent

    spec:
      serviceAccountName: ai-devops-agent

      containers:
      - name: ai-devops-agent
        image: ai-devops-agent:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8501
