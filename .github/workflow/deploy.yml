name: Deploy AI DevOps Agent

on:
push:
branches:
- main

jobs:
build-and-deploy:

```
runs-on: ubuntu-latest

steps:

  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Azure Login
    uses: azure/login@v2
    with:
      client-id: ${{ secrets.AZURE_CLIENT_ID }}
      tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  - name: Login to ACR
    run: |
      az acr login --name ${{ secrets.ACR_NAME }}

  - name: Build Image
    run: |
      docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/ai-devops-agent:${{ github.sha }} .

  - name: Push Image
    run: |
      docker push ${{ secrets.ACR_NAME }}.azurecr.io/ai-devops-agent:${{ github.sha }}
```
